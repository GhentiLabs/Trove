# Trove discovery server. It terminates TLS 1.3 itself with a persistent
# self-signed Ed25519 certificate (no Caddy, no domain, no Let's Encrypt).
# Clients authenticate by mTLS and pin the server's fingerprint, printed in the
# logs on first boot.
services:
  discovery-server:
    build:
      context: ../..
      dockerfile: discovery/deploy/Dockerfile
    image: trove-discovery-server
    restart: unless-stopped
    environment:
      - TROVE_DISCOVERY_LISTEN_ADDR=0.0.0.0:8443
      # STUN reflexive responder (UDP) on the same port number as the TLS listener.
      - TROVE_DISCOVERY_STUN_ADDR=0.0.0.0:8443
      # Bound on all interfaces inside the container, but published below only to
      # the host loopback, so it is reachable solely via an SSH tunnel.
      - TROVE_DISCOVERY_METRICS_ADDR=0.0.0.0:9090
      - TROVE_DISCOVERY_SERVER_KEY=/data/server.key
      - TROVE_DISCOVERY_SERVER_CERT=/data/server.crt
      - TROVE_DISCOVERY_ANALYTICS_DB=/data/analytics.db
    ports:
      - "443:8443"          # discovery API over TLS (TCP)
      - "443:8443/udp"      # STUN reflexive responder (UDP)
      - "127.0.0.1:9090:9090"
    volumes:
      - data:/data
    healthcheck:
      test: ["CMD", "/discovery-server", "-healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  data:
