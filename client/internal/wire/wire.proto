syntax = "proto3";

package trove.wire.v1;

option go_package = "github.com/GhentiLabs/Trove/client/internal/wire/wirepb;wirepb";

// Hello is the first frame each peer sends, before authorization. It rides in a
// magic-prefixed envelope (see the framing layer), not under Header.
message Hello {
  string node_id = 1;
  uint32 wire_format_version = 2;
  string name = 3;
  string client_name = 4;
  string client_version = 5;
}

// Header precedes every post-Hello message body on the control stream. It carries
// the body's type so a peer can route without parsing it, and the codec used to
// compress the body so it can be decompressed without parsing it.
message Header {
  uint32 type = 1;
  uint32 compression = 2;
}

// FolderType is the reserved direction/trust shape (the clean BEP set). M3
// populates only the send-receive default; direction (M4) and receive-encrypted
// (M6) ride this field later.
enum FolderType {
  FOLDER_TYPE_SEND_RECEIVE = 0;
  FOLDER_TYPE_SEND_ONLY = 1;
  FOLDER_TYPE_RECEIVE_ONLY = 2;
  FOLDER_TYPE_RECEIVE_ENCRYPTED = 3;
}

// Folder is one folder a peer offers in its NetworkConfig. Folders match across
// nodes solely by folder_id (the shared string agreed at pairing), independent of
// the encryption key. Tag 6 is reserved for the M6 key-agreement token
// (encryption_password_token).
message Folder {
  string folder_id = 1;
  FolderType folder_type = 2;
  bool encrypted = 3;
  uint64 index_epoch_id = 4;
  int64 high_water_sequence = 5;
  reserved 6;
}

// NetworkConfig is the first post-Hello message, sent exactly once each way. The
// connection's shared-folder set is the intersection of both sides' folder_ids.
// Tag 3 is reserved for advertised addresses (address gossip).
message NetworkConfig {
  repeated Folder folders = 1;
  reserved 3;
}

// FolderSummary is the owner's per-folder anti-entropy announcement on the control
// stream, sent once a session is Active and whenever the owner's folder root
// advances. A replica compares snapshot_root to its own and requests a delta if
// they differ; index_epoch_id and high_water_sequence drive the resync cursor.
message FolderSummary {
  string folder_id = 1;
  bytes snapshot_root = 2;
  uint64 index_epoch_id = 3;
  int64 high_water_sequence = 4;
}

// ManifestRequest asks the owner for every manifest with seq greater than
// since_sequence under the named epoch. since_sequence = 0 requests a full resync;
// an index_epoch_id that differs from the owner's also forces a full resync.
message ManifestRequest {
  string folder_id = 1;
  uint64 index_epoch_id = 2;
  int64 since_sequence = 3;
  // since_chunk_offset resumes a manifest whose chunk list spans pages: the manifest at
  // the first sequence past since_sequence has had this many chunks delivered already.
  int64 since_chunk_offset = 4;
}

// ChunkRef is one ordered chunk reference within a manifest: the chunk identity and
// its plaintext length. Offsets are derived from the running length sum.
message ChunkRef {
  bytes chunk_id = 1;
  int64 length = 2;
}

// RemoteManifest carries one manifest in a delta with the owner's identity fields
// verbatim, so a replica stores it without minting its own version. manifest_id is
// re-verified against the chunk references on apply.
message RemoteManifest {
  uint32 kind = 1;
  string path = 2;
  uint32 mode = 3;
  string symlink_target = 4;
  repeated ChunkRef chunks = 5;
  bytes manifest_id = 6;
  bytes version_vector = 7;
  int64 owner_sequence = 8;
  bool deleted = 9;
  int64 deleted_ms = 10;
  // more_chunks is set when this entry carries only a prefix of the file's chunk list and
  // the remainder continues in the following delta pages (same path and manifest_id).
  bool more_chunks = 11;
}

// ManifestDelta is the owner's reply to a ManifestRequest: the changed manifests in
// owner-sequence order, plus the epoch and high-water they were taken at so the
// replica advances its cursor to exactly what it consumed.
message ManifestDelta {
  string folder_id = 1;
  uint64 index_epoch_id = 2;
  int64 high_water_sequence = 3;
  repeated RemoteManifest manifests = 4;
  // complete is false when more manifests remain past high_water_sequence; the
  // replica then requests the next page with since_sequence = high_water_sequence.
  bool complete = 5;
  // high_water_chunk_offset is non-zero when the manifest at high_water_sequence is only
  // partially delivered; the next request resumes it at this chunk offset.
  int64 high_water_chunk_offset = 6;
}

// MembershipEntry is one signed roster record on the wire. The signature is over the
// membership layer's canonical hand-rolled bytes, not these protobuf bytes.
message MembershipEntry {
  string network_id = 1;
  string node_id = 2;
  bytes public_key = 3;
  uint32 role = 4;
  string added_by = 5;
  int64 added_at_ms = 6;
  bytes sig = 7;
}

// MembershipGossip carries a network's roster for anti-entropy convergence; a receiver
// verifies each entry against its trust root before accepting or re-propagating it.
message MembershipGossip {
  string network_id = 1;
  repeated MembershipEntry entries = 2;
}

// SyncReceipt is a replica's acknowledgement that it has converged a folder to the
// owner's snapshot_root at (index_epoch_id, high_water_sequence). The owner records one
// per replica so "last synced" is queryable and tombstone reaping can wait for every
// replica to pass the deletion. It rides the mutually-authenticated session, so peer
// identity is the session's, not a field here.
message SyncReceipt {
  string folder_id = 1;
  bytes snapshot_root = 2;
  uint64 index_epoch_id = 3;
  int64 high_water_sequence = 4;
  int64 synced_ms = 5;
}

// Ping is the idle-timer keepalive.
message Ping {}

// Close requests a graceful shutdown.
message Close {
  string reason = 1;
}
